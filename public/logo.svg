<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 130" width="450" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&amp;display=swap');
      .title {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 48px;
        fill: #FFFFFF;
      }
      .subtitle {
        font-family: 'Montserrat', sans-serif;
        font-weight: 800;
        font-size: 15px;
        fill: #9CA3AF;
        letter-spacing: 0.18em;
      }
    </style>
  </defs>
  
  <!-- Main Background -->
  <rect width="100%" height="100%" fill="#18181B" rx="12" />
  
  <!-- Icon Background -->
  <rect x="15" y="20" width="75" height="75" rx="22" fill="#2A2415" />
  
  <!-- Lightning Bolt -->
  <path d="M58.5 33.5 L36.5 57.5 H48.5 L42.5 81.5 L68.5 49.5 H54.5 L58.5 33.5 Z" fill="#FFC72C" stroke="#FFC72C" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Text -->
  <text x="110" y="64" class="title">Altamente</text>
